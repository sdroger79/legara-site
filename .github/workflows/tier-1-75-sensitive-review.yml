name: Tier 1.75 — sensitive-class adversarial review

# P618 (S289) — pre-merge adversarial review that fires ONLY on sensitive-class
# PRs (kernel / schema / governance / CI / chain primitives — see
# sys/governance/tier-1-75-sensitive-paths.md) and BLOCKS the merge on a
# High/Critical finding. Closes the gap between advisory Tier 1.5 (every PR,
# gpt-5.4-mini) and binding Tier 2 (sprint closure, gemini-2.5-pro): for
# sensitive paths a wrong landing has a multi-day SILENT failure mode, so it
# needs an adversarial pass BEFORE merge, not at sprint close.
#
# The job ALWAYS runs on every PR so the required-check context is ALWAYS
# reported (green on non-sensitive PRs via the runner's internal skip; red only
# on a real BLOCK verdict). Do NOT add a job-level `if:` that skips — a skipped
# required check sticks every PR in "expected / pending" purgatory.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to (re-)review on demand'
        required: true
        type: string
      base_sha:
        description: 'Optional base SHA override'
        required: false
        type: string
      head_sha:
        description: 'Optional head SHA override'
        required: false
        type: string
      readonly:
        description: 'Read-only: compute + log without posting a comment or failing the check'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # The job NAME is the GitHub status-check context. Keep it EXACTLY in sync
    # with the string added to branch-protection required_status_checks.
    name: Tier 1.75 — sensitive-class adversarial review
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.pull_request.head.sha }}

      - name: Checkout legara-marketing-v2 governance (sys/governance/)
        uses: actions/checkout@v4
        with:
          repository: sdroger79/legara-marketing-v2
          ref: main
          path: legara-marketing-v2
          sparse-checkout: sys/governance/
          sparse-checkout-cone-mode: false
          token: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tier 1.75 review
        id: tier175
        env:
          CROSS_MODEL_REVIEW_API_KEY: ${{ secrets.CROSS_MODEL_REVIEW_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOVERNANCE_SOURCE_REPO: sdroger79/legara-marketing-v2
          GOVERNANCE_SOURCE_BRANCH: main
          GOVERNANCE_DIR: ${{ github.workspace }}/legara-marketing-v2/sys/governance
          MAX_DIFF_LOC: '200000'
          TOKEN_BUDGET: '170000'
          REVIEW_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REVIEW_BASE_SHA: ${{ github.event.inputs.base_sha }}
          REVIEW_HEAD_SHA: ${{ github.event.inputs.head_sha }}
          REVIEW_READONLY: ${{ github.event.inputs.readonly }}
        # Run the reviewer from the TRUSTED origin/main copy, NOT the PR head —
        # otherwise a PR that edits the runner could weaken its own required gate
        # (untrusted head content must be DATA, never the gate code). The PR-head
        # checkout is still used by the runner for the diff + file-content reads
        # (data). Bootstrap: if main has no runner yet (the PR that introduces
        # Tier 1.75), fall back to the PR-head copy this once, with a warning.
        run: |
          git fetch --no-tags --depth=1 origin main || true
          RUNNER=.github/scripts/tier-1-75-review.mjs
          TRUSTED="$(mktemp -d)/tier-1-75-review.mjs"
          if git show "origin/main:$RUNNER" > "$TRUSTED" 2>/dev/null && [ -s "$TRUSTED" ]; then
            echo "Tier 1.75: running reviewer from TRUSTED origin/main copy (PR head used only as review data)."
            node "$TRUSTED"
          else
            echo "::warning title=Tier1.75::origin/main has no runner yet (bootstrap PR) — running the PR-head copy this once."
            node "$RUNNER"
          fi

      # P544-style ledger trigger — when the adversarial reviewer actually fires
      # (not the skip / not-configured / readonly cases), append a `review_fired`
      # event (tier 1.75) to the lm-v2 ledger via the sanctioned appender. Always
      # runs even when the review step BLOCKS (if:), so a blocking review is still
      # recorded in the ledger for the triage consumer.
      - name: Checkout legara-marketing-v2 (full — for ledger append)
        if: ${{ always() && steps.tier175.outputs.review_event_payload != '' }}
        uses: actions/checkout@v4
        with:
          repository: sdroger79/legara-marketing-v2
          ref: main
          path: lm-v2-ledger
          token: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}

      - name: Append review_fired event to lm-v2 ledger (tier 1.75)
        if: ${{ always() && steps.tier175.outputs.review_event_payload != '' }}
        working-directory: lm-v2-ledger
        env:
          GH_TOKEN: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}
          REVIEW_EVENT_PAYLOAD: ${{ steps.tier175.outputs.review_event_payload }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          if [ ! -f scripts/cowork-ledger/append-event.mjs ]; then
            echo "::warning title=Tier1.75::scripts/cowork-ledger/append-event.mjs missing on lm-v2 main — skipping ledger append (non-fatal)." >&2
            exit 0
          fi
          git config user.name  "tier-1-75-review-bot"
          git config user.email "tier-1-75-review-bot@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            node scripts/cowork-ledger/append-event.mjs --type=review_fired --payload-json="$REVIEW_EVENT_PAYLOAD"
            if [ -z "$(git status --porcelain sys/cowork-events.jsonl sys/cowork-ledger.state.json sys/cowork-control.md)" ]; then
              echo "appender produced no ledger change — exiting clean."
              exit 0
            fi
            git add sys/cowork-events.jsonl sys/cowork-ledger.state.json sys/cowork-control.md
            git commit -m "ledger: review_fired (tier-1.75, PR #${PR_NUMBER})" --quiet
            if git push --quiet "https://x-access-token:${GH_TOKEN}@github.com/sdroger79/legara-marketing-v2.git" HEAD:main 2>&1; then
              echo "review_fired event appended + pushed on attempt $attempt."
              exit 0
            fi
            echo "push attempt $attempt failed (concurrent update on main); retrying..."
            sleep 2
          done
          echo "::warning title=Tier1.75::failed to push review_fired event after 3 retries (non-fatal; review verdict already posted + check status set)." >&2
          exit 0
