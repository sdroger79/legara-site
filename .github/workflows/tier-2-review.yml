name: Tier 2 — sprint-level cross-model review

# P468 — the third-model (Google Gemini), sprint-level cross-model review.
#
# CADENCE — DAILY CRON at 18:00 UTC (P559, S288): one steady-cadence run per
# day instead of one-per-Deploy-Prod-completion. The deploy-anchored trigger
# (workflow_run on every Deploy-Prod) burst-fired Tier 2 across busy chain days
# (15 PRs merged → 15 attempts in ~4 hours), exhausting Gemini's free-tier RPM
# and producing 4-of-5 consecutive failures (observed S288 2026-05-27 16:19-
# 18:16 UTC). The cron cadence prevents the burst pattern at the trigger layer;
# the in-script exponential-backoff retry (P559) handles transient 429 bursts
# from the cron run itself. THRESHOLD-GATING (below) preserves self-pacing —
# quiet days still no-op; the cron just sets an upper bound on fire frequency.
#
# THRESHOLD-GATED (self-pacing): the runner computes the diff since the last
# Tier-2 review's commit; it only PRODUCES a review when enough has accumulated
# (sprint-closure cadence). Busy sprint → fires when enough lands; quiet → no-op.
#
# Independence triangle: Tier 1 static → Tier 1.5 OpenAI (CROSS_MODEL_REVIEW_API_KEY)
# → Tier 2 Google Gemini (CROSS_MODEL_REVIEW_TIER2_API_KEY). Tier 2 reads a
# SEPARATE Gemini key; reusing the Tier-1.5 OpenAI key collapses independence.
# If the Tier-2 key is absent, the runner cleanly no-ops (defense-in-depth).
#
# Output: structured findings → legara-marketing-v2:sys/reviews/tier2-<date>.md
# (committed back by this workflow) + a trend digest in the workflow log
# (TIER2_TREND_DIGEST) for cowork-status "Needs you" pickup.

on:
  schedule:
    # 18:00 UTC daily = 11:00 AM PT / 10:00 AM PT during DST. Mid-morning after
    # any overnight chain activity has landed. P559 (S288).
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the threshold gate (always produce a review)'
        required: false
        type: boolean
        default: false
      window_start:
        description: 'Explicit base SHA (backfill / retroactive window start)'
        required: false
        type: string
      window_end:
        description: 'Explicit head SHA (defaults to HEAD)'
        required: false
        type: string
      dry_run:
        description: 'Compute scope + fire-decision only; no model call, no write'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  review:
    # Always run on schedule + manual dispatch. (Pre-P559 the job was gated on
    # workflow_run.conclusion == 'success' for the deploy-anchored trigger;
    # the cron trigger has no such conclusion, so the gate is removed.)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout meridian (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout legara-marketing-v2 governance (sys/reviews/ + sys/governance/)
        uses: actions/checkout@v4
        with:
          repository: sdroger79/legara-marketing-v2
          ref: main
          path: legara-marketing-v2
          # Need reviews/ (to derive the window from the last artifact) AND
          # governance/ (the model pin). token allows the later push-back.
          sparse-checkout: |
            sys/reviews
            sys/governance
          sparse-checkout-cone-mode: false
          token: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tier 2 review
        id: tier2
        env:
          CROSS_MODEL_REVIEW_TIER2_API_KEY: ${{ secrets.CROSS_MODEL_REVIEW_TIER2_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOVERNANCE_DIR: ${{ github.workspace }}/legara-marketing-v2/sys
          REVIEWS_DIR: ${{ github.workspace }}/legara-marketing-v2/sys/reviews
          TIER2_THRESHOLD_FILES: '30'
          TIER2_THRESHOLD_COMMITS: '12'
          TIER2_FORCE: ${{ github.event.inputs.force }}
          TIER2_WINDOW_START: ${{ github.event.inputs.window_start }}
          TIER2_WINDOW_END: ${{ github.event.inputs.window_end }}
          TIER2_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node .github/scripts/tier-2-review.mjs

      - name: Commit Tier 2 artifact to legara-marketing-v2
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: legara-marketing-v2
        env:
          GH_TOKEN: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}
        run: |
          # Only commit if the runner produced/changed an artifact (no-op runs
          # below threshold or with absent key leave the tree clean → skip).
          if [ -z "$(git status --porcelain sys/reviews)" ]; then
            echo "No Tier 2 artifact change — nothing to commit (below threshold / clean no-op)."
            exit 0
          fi
          git config user.name  "tier-2-review-bot"
          git config user.email "tier-2-review-bot@users.noreply.github.com"
          git add sys/reviews
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "governance(tier2-${DATE}): automated sprint-level review (P468 workflow)"
          # Push using the governance token (LEGARA_GOVERNANCE_READ_TOKEN must be
          # contents:write-scoped for this push to succeed; if read-only, this
          # step fails loudly and the artifact is recoverable from the run log).
          git push "https://x-access-token:${GH_TOKEN}@github.com/sdroger79/legara-marketing-v2.git" HEAD:main

      # P544 — close the TRIGGER phase of the review-consumption blockchain.
      # When the Tier 2 reviewer actually fires (above-threshold or FORCE; not
      # DRY_RUN, not below-threshold no-op, not missing-key clean-skip), the
      # runner writes a `review_event_payload` line to $GITHUB_OUTPUT
      # (steps.tier2 output). The two steps below check the lm-v2 repo out
      # fresh (full checkout, separate from the sparse-checkout above used for
      # the artifact write) and append a `review_fired` event via the
      # sanctioned scripts/cowork-ledger/append-event.mjs helper (shipped
      # P543). P542's triage agent consumes the event stream.
      - name: Checkout legara-marketing-v2 (full — for P544 ledger append)
        if: ${{ steps.tier2.outputs.review_event_payload != '' }}
        uses: actions/checkout@v4
        with:
          repository: sdroger79/legara-marketing-v2
          ref: main
          path: lm-v2-ledger
          token: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}

      - name: Append review_fired event to lm-v2 ledger (P544)
        if: ${{ steps.tier2.outputs.review_event_payload != '' }}
        working-directory: lm-v2-ledger
        env:
          GH_TOKEN: ${{ secrets.LEGARA_GOVERNANCE_READ_TOKEN }}
          REVIEW_EVENT_PAYLOAD: ${{ steps.tier2.outputs.review_event_payload }}
        run: |
          # Gate: P544 ships AFTER P543. If we landed on a tree that's missing
          # the appender helper (pre-P543 main), refuse loudly with a clear
          # error — this surfaces a sequence violation immediately instead of
          # silently no-op'ing the trigger phase.
          if [ ! -f scripts/cowork-ledger/append-event.mjs ]; then
            echo "::error title=P544::scripts/cowork-ledger/append-event.mjs missing on lm-v2 main — P543 (event-log appender) must ship before P544 emitters can fire." >&2
            exit 1
          fi
          git config user.name  "tier-2-review-bot"
          git config user.email "tier-2-review-bot@users.noreply.github.com"
          # Retry loop: concurrent appends from sister workflows (Tier 1.5, the
          # chain poller, §-CAND emitter) race at the git-push layer. Each
          # attempt rebases on fresh origin/main (which already has the Tier 2
          # artifact commit from the step above + any sister appends), re-runs
          # the appender (so hash chain is computed against the new tail),
          # re-commits, re-pushes. The appender's own file lock is the
          # in-process serializer; this loop is the inter-process one.
          for attempt in 1 2 3; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            node scripts/cowork-ledger/append-event.mjs --type=review_fired --payload-json="$REVIEW_EVENT_PAYLOAD"
            if [ -z "$(git status --porcelain sys/cowork-events.jsonl sys/cowork-ledger.state.json sys/cowork-control.md)" ]; then
              echo "appender produced no ledger change — unexpected; exiting clean."
              exit 0
            fi
            git add sys/cowork-events.jsonl sys/cowork-ledger.state.json sys/cowork-control.md
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "ledger: review_fired (tier-2, tier2-${DATE})" --quiet
            if git push --quiet "https://x-access-token:${GH_TOKEN}@github.com/sdroger79/legara-marketing-v2.git" HEAD:main 2>&1; then
              echo "review_fired event appended + pushed on attempt $attempt."
              exit 0
            fi
            echo "push attempt $attempt failed (concurrent update on main); retrying from fresh origin/main..."
            sleep 2
          done
          echo "::error title=P544::failed to push review_fired event after 3 retries (sustained push contention)" >&2
          exit 1
