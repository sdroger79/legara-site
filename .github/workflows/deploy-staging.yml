name: Deploy Staging

# Deploys to the staging Cloudflare Worker on every PR targeting main.
# The staging URL is posted as a PR comment so reviewers can preview.
#
# Staging uses separate KV + D1 bindings (see wrangler.jsonc [env.staging])
# and does NOT affect the production site at golegara.com.

on:
  pull_request:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "3.99.0"
          command: deploy --env staging

      - name: Post staging URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### 🔍 Staging Preview',
              '',
              '| | |',
              '|---|---|',
              '| **URL** | https://staging.golegara.com |',
              '| **Workers.dev** | https://legara-site-staging.${process.env.CF_ACCOUNT_SUBDOMAIN || "<account>"}.workers.dev |',
              '| **Commit** | `' + context.sha.slice(0, 7) + '` |',
              '',
              'Deployed by the `deploy-staging` workflow. Review the site, then merge to deploy to prod.',
            ].join('\n');

            // Find existing staging comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Staging Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
